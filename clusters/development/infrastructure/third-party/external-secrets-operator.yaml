apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-secrets-operator
  namespace: flux-system
spec:
  interval: 5m
  path: "./components/third-party/externalsecrets-v2/operator"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  postBuild:
    substitute:
      EXTERNAL_SECRETS_VERSION: 1.2.1 # https://artifacthub.io/packages/helm/external-secrets-operator/external-secrets
  wait: true
  timeout: 2m