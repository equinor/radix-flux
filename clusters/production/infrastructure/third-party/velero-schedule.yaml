apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: velero-schedule
  namespace: flux-system
spec:
  interval: 5m
  path: "./components/third-party/velero/schedule"
  dependsOn:
    - name: velero
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  timeout: 2m
