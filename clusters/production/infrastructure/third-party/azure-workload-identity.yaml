apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: azure-workload-identity
  namespace: flux-system
spec:
  interval: 5m
  path: "./components/third-party/azure-workload-identity"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  postBuild:
    substitute:
      AZURE_WORKLOAD_IDENTITY_VERSION: 1.6.0 # https://artifacthub.io/packages/helm/azure-workload-identity/workload-identity-webhook
  patches:
    - target:
        kind: HelmRelease
        name: workload-identity-webhook
        namespace: azure-workload-identity-system
      patch: |-
        apiVersion: helm.toolkit.fluxcd.io/v2
        kind: HelmRelease
        metadata:
          name: workload-identity-webhook
          namespace: azure-workload-identity-system
        spec:
          values:
            resources:
              limits:
                cpu: 100m
                memory: 128Mi
              requests:
                cpu: 100m
                memory: 64Mi
