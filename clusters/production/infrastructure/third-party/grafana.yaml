apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: grafana
  namespace: flux-system
spec:
  interval: 5m
  path: "./components/third-party/grafana"
  dependsOn:
    - name: external-secrets-operator
    - name: kube-prometheus-stack
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: radix-flux-config
    substitute:
      GRAFANA_VERSION: 12.2.1 # {"$imagepolicy": "flux-system:grafana-chart:tag"}
      GRAFANA_AR_CLIENT_ID: f898b3ed-8cda-4f41-9487-7ff55ea41d92 # gitleaks:allow
      GRAFANA_DB_HOST: s940-radix-grafana-platform-prod.mysql.database.azure.com
      GRAFANA_DB_USERNAME: radix-id-grafana-admin-platform
      GRAFANA_WI_CLIENT_ID: d7c9d6c1-1688-4016-befe-7506a16a459c # gitleaks:allow
  wait: true
  timeout: 2m
