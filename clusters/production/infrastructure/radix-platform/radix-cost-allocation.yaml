apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: radix-cost-allocation
  namespace: flux-system
spec:
  interval: 5m
  path: "./components/radix-platform/radix-cost-allocation"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  postBuild:
    substitute:
      COST_ALLOCATION_SQL_CLIENT_ID: 081fa1b1-e38b-43c0-88fe-4a4807f1798b
      COST_ALLOCATION_SQL_SERVER: sql-radix-cost-allocation-platform.database.windows.net
      RADIX_COST_ALLOCATION_CHART_VERSION: 1.4.2 # {"$imagepolicy": "flux-system:radix-cost-allocation-chart:tag"}
  patches:
    - patch: |-
        apiVersion: helm.toolkit.fluxcd.io/v2
        kind: HelmRelease
        metadata:
          name: radix-vulnerability-scanner
          namespace: radix-vulnerability-scanner
        spec:
          values:
            workloadIdentityRegistries: 
            - "${radix_acr_repo_url}"
            resources:
              limits:
                cpu: "4"
                memory: 32Gi
              requests:
                cpu: 500m
                memory: 4Gi
            workers: 4
            securityContext:
              readOnlyRootFilesystem: true
      target:
        kind: HelmRelease
        name: radix-vulnerability-scanner
        namespace: radix-vulnerability-scanner
