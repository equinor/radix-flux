apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-secrets-stores
  namespace: flux-system
spec:
  interval: 5m
  path: "./components/third-party/externalsecrets-v2/stores"
  dependsOn:
    - name: external-secrets-operator
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  postBuild:
    substitute:
      EXTERNAL_SECRET_URL: https://radix-keyv-playground.vault.azure.net/
      EXTERNAL_SECRET_MI_CLIENT_ID: 4e3784c7-1a3e-4885-9783-b7227f8d1fb3 # gitleaks:allow
  wait: true
  timeout: 2m