apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cert-manager
  namespace: flux-system
spec:
  interval: 5m
  path: "./components/third-party/cert-manager"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: cert-manager
      namespace: cert-manager
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: radix-flux-config
    substitute:
      CERT_MANAGER_VERSION: 1.20.0 # https://artifacthub.io/packages/helm/cert-manager/cert-manager
  patches:
    - target:
        kind: HelmRelease
        name: cert-manager
        namespace: cert-manager
      patch: |-
        apiVersion: helm.toolkit.fluxcd.io/v2
        kind: HelmRelease
        metadata:
          name: cert-manager
          namespace: cert-manager
        spec:
          values:
            resources:
              limits:
                cpu: 200m
                memory: 500Mi
              requests:
                cpu: 150m
                memory: 300Mi
            cainjector:
              resources:
                limits:
                  cpu: 5m
                  memory: 100Mi
                requests:
                  cpu: 5m
                  memory: 100Mi
            webhook:
              resources:
                limits:
                  cpu: 5m
                  memory: 50Mi
                requests:
                  cpu: 5m
                  memory: 50Mi
  wait: true
  timeout: 2m
