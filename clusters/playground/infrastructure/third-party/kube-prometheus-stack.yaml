apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kube-prometheus-stack
  namespace: flux-system
spec:
  interval: 5m
  path: "./components/third-party/kube-prometheus-stack"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: radix-flux-config
    substitute:
      EXTMON_CLUSTER_ISSUER: https://northeurope.oic.prod-aks.azure.com/3aa4a235-b6e2-48d5-9195-7fcf05b459b0/a2d93ba1-cbde-4408-8979-c100cce7b448/
      KUBE_PROMETHEUS_STACK: 81.3.2 # https://artifacthub.io/packages/helm/prometheus-community/kube-prometheus-stack # newer version fails. ref: https://github.com/equinor/radix-platform/issues/1849
      ALERT_WEB_CONSOLE_BASE_URL: "https://console.playground.radix.equinor.com"
  patches:
    - target:
        kind: HTTPRoute
        name: oauth2-proxy-prometheus
        namespace: monitor
      patch: |-
        apiVersion: gateway.networking.k8s.io/v1
        kind: HTTPRoute
        metadata:
          name: oauth2-proxy-prometheus
          namespace: monitor
    - target:
        kind: HelmRelease
        name: kube-prometheus-stack
        namespace: monitor
      patch: |-
        apiVersion: helm.toolkit.fluxcd.io/v2
        kind: HelmRelease
        metadata:
          name: kube-prometheus-stack
          namespace: monitor
        spec:
          values:
            prometheus:
              prometheusSpec:
                resources:
                  limits:
                    cpu: 600m
                    memory: 8Gi
                  requests:
                    cpu: 600m
                    memory: 4Gi
            prometheusOperator:
              resources:
                  limits:
                    cpu: 32m
                    memory: 128Mi
                  requests:
                    cpu: 32m
                    memory: 64Mi
            alertmanager:
              alertmanagerSpec:
                resources:
                  limits:
                    cpu: 600m
                    memory: 128Mi
                  requests:
                    cpu: 600m
                    memory: 64Mi
            kube-state-metrics:
              resources:
                limits:
                  cpu: 50m
                  memory: 800Mi
                requests:
                  cpu: 10m
                  memory: 400Mi
  wait: true
  timeout: 2m
