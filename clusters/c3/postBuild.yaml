apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-system
  namespace: flux-system
spec:
  prune: false
  postBuild:
    substitute:
      FLUX_CONFIG_PATH: ./clusters/c3
      RADIX_WILDCARD_CERTIFICATE_ISSUER: letsencrypt-dns01
    substituteFrom:
      - kind: ConfigMap
        name: radix-flux-config
