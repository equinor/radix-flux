apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-system
  namespace: flux-system
spec:
  prune: false
  postBuild:
    substitute:
      ACTIVE_CLUSTER: c3-50
      AZ_RESOURCE_DNS: c3.radix.equinor.com
      COST_ALLOCATION_SQL_CLIENT_ID: d0d73460-78cb-4bb5-87fc-615279c2b132
      COST_ALLOCATION_SQL_SERVER: sql-radix-cost-allocation-c3.database.windows.net
      EXTMON_CLUSTER_ISSUER: "https://northeurope.oic.prod-aks.azure.com/3aa4a235-b6e2-48d5-9195-7fcf05b459b0/a2d93ba1-cbde-4408-8979-c100cce7b448/"
      FLUX_CONFIG_PATH: ./clusters/c3
      KUBE_PROMETHEUS_STACK: 81.3.2 # https://artifacthub.io/packages/helm/prometheus-community/kube-prometheus-stack
      RADIX_ACR_CLEANUP_CHART_VERSION: 1.4.2 # {"$imagepolicy": "flux-system:radix-acr-cleanup-chart:tag"}
      radix_acr_repo_url: radixc3.azurecr.io
      RADIX_CACHE_REGISTRY: radixc3cache.azurecr.io
      RADIX_CICD_CANARY_CHART_VERSION: 1.5.3 # {"$imagepolicy": "flux-system:radix-cicd-canary-chart:tag"}
      RADIX_COST_ALLOCATION_CHART_VERSION: 1.4.2 # {"$imagepolicy": "flux-system:radix-cost-allocation-chart:tag"}
      RADIX_ENVIRONMENT: prod # dev | prod
      RADIX_VULNERABILITY_SCANNER_CHART_VERSION: 1.4.4 # {"$imagepolicy": "flux-system:radix-vulnerability-scanner-chart:tag"}
      RADIX_WILDCARD_CERTIFICATE_ISSUER: letsencrypt-dns01
      RADIX_ZONE_MIGRATE: c3
      RADIX_ZONE: c3 # dev | playground | prod
      TEKTON_VERSION: v0.53.0
      VULNERABILITY_SCANNER_SQL_CLIENT_ID: 6fe670be-f591-4fa1-80b4-ab5d33f56ff3
      VULNERABILITY_SCANNER_SQL_SERVER: sql-radix-vulnerability-scan-c3.database.windows.net
    substituteFrom:
      - kind: ConfigMap
        name: radix-flux-config
