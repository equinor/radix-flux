apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-secrets-stores
  namespace: flux-system
spec:
  interval: 5m
  path: "./components/third-party/externalsecrets-v2/stores"
  dependsOn:
    - name: external-secrets-operator
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  postBuild:
    substitute:
      EXTERNAL_SECRET_URL: https://radix-keyv-c3.vault.azure.net/
      EXTERNAL_SECRET_MI_CLIENT_ID: 7ec26fd1-4c2b-4f96-9f0d-12d4341dfffe # gitleaks:allow
  wait: true
  timeout: 2m