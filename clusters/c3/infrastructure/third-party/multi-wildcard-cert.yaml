apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: multi-wildcard-cert
  namespace: flux-system
spec:
  interval: 5m
  path: "./components/third-party/cert-manager-certs"
  dependsOn:
    - name: cert-manager
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: radix-flux-config
    substitute:
      RADIX_WILDCARD_CERTIFICATE_ISSUER: letsencrypt-dns01
  wait: true
  timeout: 2m