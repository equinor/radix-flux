apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: keda
  namespace: flux-system
spec:
  interval: 5m
  path: "./components/third-party/keda"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  postBuild:
    substitute:
      KEDA_VERSION: 2.18.3 # https://artifacthub.io/packages/helm/kedacore/keda
