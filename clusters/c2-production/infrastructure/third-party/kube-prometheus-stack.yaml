apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kube-prometheus-stack
  namespace: flux-system
spec:
  interval: 5m
  path: "./components/third-party/kube-prometheus-stack"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: radix-flux-config
    substitute:
      EXTMON_CLUSTER_ISSUER: https://northeurope.oic.prod-aks.azure.com/3aa4a235-b6e2-48d5-9195-7fcf05b459b0/a2d93ba1-cbde-4408-8979-c100cce7b448/
      KUBE_PROMETHEUS_STACK: 81.3.2 # https://artifacthub.io/packages/helm/prometheus-community/kube-prometheus-stack # newer version fails. ref: https://github.com/equinor/radix-platform/issues/1849
      ALERT_WEB_CONSOLE_BASE_URL: "https://console.c2.radix.equinor.com"
  patches:
    - target:
        kind: HTTPRoute
        name: oauth2-proxy-prometheus
        namespace: monitor
      patch: |-
        apiVersion: gateway.networking.k8s.io/v1
        kind: HTTPRoute
        metadata:
          name: oauth2-proxy-prometheus
          namespace: monitor
    - target:
        kind: HelmRelease
        name: kube-prometheus-stack
        namespace: monitor
      patch: |-
        apiVersion: helm.toolkit.fluxcd.io/v2
        kind: HelmRelease
        metadata:
          name: kube-prometheus-stack
          namespace: monitor
        spec:
          values:
            prometheus:
              prometheusSpec:
                resources:
                  limits:
                    cpu: "1"
                    memory: "12Gi"
                  requests:
                    cpu: "1"
                    memory: "6Gi"
              storageSpec:
                  volumeClaimTemplate:
                    spec:
                      resources:
                        requests:
                          storage: 256Gi # P30
                          #Premium SSD Size   P1    P2    P3    P4    P6    P10   P15   P20   P30   P40
                          #                   4     8     16    32    64    128   256   512   1024  204
            prometheusOperator:
              resources:
                limits:
                  cpu: 100m
                  memory: 128Mi
                requests:
                  cpu: 50m
                  memory: 64Mi
            alertmanager:
              alertmanagerSpec:
                resources:
                  limits:
                    cpu: 30m
                    memory: 256Mi
                  requests:
                    cpu: 5m
                    memory: 128Mi
            kube-state-metrics:
              resources:
                limits:
                  cpu: 64m
                  memory: 1Gi
                requests:
                  cpu: 32m
                  memory: 256Mi
  wait: true
  timeout: 2m
