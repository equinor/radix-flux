apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: grafana
  namespace: flux-system
spec:
  interval: 5m
  path: "./components/third-party/grafana"
  dependsOn:
    - name: external-secrets-operator
    - name: kube-prometheus-stack
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: radix-flux-config
    substitute:
      GRAFANA_VERSION: 12.3.0 # {"$imagepolicy": "flux-system:grafana-chart:tag"}
      GRAFANA_AR_CLIENT_ID: 8d25ce2e-aa30-4834-93dc-292645bf2918 # gitleaks:allow
      GRAFANA_DB_HOST: s940-radix-grafana-extmon-prod.mysql.database.azure.com
      GRAFANA_DB_USERNAME: radix-ar-grafana-logreader-extmon
      GRAFANA_WI_CLIENT_ID: 9a9bf432-aeb4-4903-aa1a-59f3236087f6 # AR radix-ar-grafana-logreader-extmon # gitleaks:allow
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
  wait: true
  timeout: 2m
