apiVersion: operator.tekton.dev/v1alpha1
kind: TektonConfig
metadata:
  name: config
spec:
  profile: lite # Ref bug https://github.com/tektoncd/operator/issues/2781
  targetNamespace: tekton-pipelines
  chain:
    disabled: true
  dashboard:
    options:
      disabled: true
  result:
    disabled: true
  trigger:
    disabled: false
  pruner:
    disabled: true
  pipeline:
    running-in-environment-with-injected-sidecars: false
    enable-git-resolver: false
