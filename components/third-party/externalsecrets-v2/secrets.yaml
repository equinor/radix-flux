apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-secrets-secrets
  namespace: flux-system
spec:
  interval: 5m
  path: "./components/flux/externalsecrets-v2"
  dependsOn:
    - name: external-secrets-operator
    - name: external-secrets-stores
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  timeout: 2m
  postBuild:
    # substitute:
    #   EXTERNAL_SECRET_URL: ${EXTERNAL_SECRET_URL}
    #   EXTERNAL_SECRET_MI_CLIENT_ID: ${EXTERNAL_SECRET_MI_CLIENT_ID}
    substituteFrom:
      - kind: ConfigMap
        name: radix-flux-config
