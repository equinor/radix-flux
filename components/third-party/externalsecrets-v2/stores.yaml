apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-secrets-stores
  namespace: flux-system
spec:
  interval: 5m
  path: "./components/third-party/externalsecrets-v2/stores"
  dependsOn:
    - name: external-secrets-operator
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  timeout: 2m
  postBuild:
    substitute:
      EXTERNAL_SECRET_URL: ${EXTERNAL_SECRET_URL}
      EXTERNAL_SECRET_MI_CLIENT_ID: ${EXTERNAL_SECRET_MI_CLIENT_ID}
