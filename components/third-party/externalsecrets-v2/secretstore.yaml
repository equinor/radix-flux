apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: radix-keyvault
  namespace: default
spec:
  provider:
    azurekv:
      authType: WorkloadIdentity
      serviceAccountRef:
          name: workload-identity-sa
          namespace: external-secrets
      vaultUrl: ${EXTERNAL_SECRET_URL}
