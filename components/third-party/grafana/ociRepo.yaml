apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: grafana-chart
  namespace: flux-system
spec:
  interval: 1m
  url: oci://ghcr.io/grafana-community/helm-charts/grafana
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: ${GRAFANA_VERSION}
