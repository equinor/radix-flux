apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy-prometheus
  namespace: monitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: oauth2-proxy-prometheus
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: oauth2-proxy-prometheus
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/os
                operator: In
                values:
                - linux
              - key: kubernetes.io/arch
                operator: In
                values:
                - amd64
      containers:
      - name: proxy
        image: quay.io/oauth2-proxy/oauth2-proxy:v7.14.2
        imagePullPolicy: Always
        args:
        - --http-address=0.0.0.0:4180
        - --provider=oidc
        - --oidc-issuer-url=https://northeurope.oic.prod-aks.azure.com/3aa4a235-b6e2-48d5-9195-7fcf05b459b0/a2d93ba1-cbde-4408-8979-c100cce7b448/
        - --upstream=http://prometheus-operator-prometheus:9090
        - --skip-jwt-bearer-tokens=true
        - --oidc-email-claim=sub
        - --authenticated-emails-file=/etc/oauth2-proxy/allowed-subjects
        - --client-id=extmonprom
        - --client-secret=unused
        - --session-cookie-minimal=true
        - --cookie-secret=unused
        ports:
        - containerPort: 4180
          name: http
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          initialDelaySeconds: 5
          periodSeconds: 10
          successThreshold: 1
          tcpSocket:
            port: 4180
          timeoutSeconds: 1
        resources:
          limits:
            memory: 100M
          requests:
            cpu: 10m
            memory: 100M
        securityContext:
          allowPrivilegeEscalation: false
          privileged: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
        volumeMounts:
        - name: allowed-subjects
          mountPath: /etc/oauth2-proxy
          readOnly: true
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      volumes:
      - name: allowed-subjects
        configMap:
          name: oauth2-proxy-prometheus-allowed-subjects
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: oauth2-proxy-prometheus-allowed-subjects
  namespace: monitor
data:
  allowed-subjects: |
    system:serviceaccount:monitor:prometheus-operator-prometheus
---
apiVersion: v1
kind: Service
metadata:
  name: oauth2-proxy-prometheus
  namespace: monitor
spec:
  selector:
    radix-app: oauth-demo
    radix-aux-component: web
    radix-aux-component-type: oauth
  ports:
  - name: http
    port: 4180
    targetPort: http
    protocol: TCP
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: oauth2-proxy-prometheus
  namespace: monitor
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: gateway
    namespace: istio-system
    sectionName: https
  hostnames:
  - prometheus.${AZ_RESOURCE_DNS}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: oauth2-proxy-prometheus
      port: 4180
    filters:
    - responseHeaderModifier:
        add:
        - name: Strict-Transport-Security
          value: max-age=31536000; includeSubDomains
      type: ResponseHeaderModifier
