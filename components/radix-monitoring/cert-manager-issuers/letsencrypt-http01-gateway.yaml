apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-http01-gateway
spec:
  acme:
    email: Radix@StatoilSRM.onmicrosoft.com
    privateKeySecretRef:
      name: letsencrypt-http01-gateway-private-key
    server: https://acme-v02.api.letsencrypt.org/directory
    skipTLSVerify: false
    solvers:
    - http01:
        gatewayHTTPRoute:
          parentRefs:
          - group: gateway.networking.k8s.io
            kind: Gateway
            name: gateway
            namespace: istio-system
      selector: {}