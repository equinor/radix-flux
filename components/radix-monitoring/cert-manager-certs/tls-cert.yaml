---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: tls-cert
  namespace: istio-system
spec:
  secretName: tls-cert
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-http01-gateway
  duration: 2160h
  renewBefore: 762h
  dnsNames:
  - grafana.${clusterName}.${AZ_RESOURCE_DNS}
  - grafana.${AZ_RESOURCE_DNS}
  - uptime.${AZ_RESOURCE_DNS:=tba}
  - uptime.${clusterName:=tba}.${AZ_RESOURCE_DNS:=tba}
