apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: radix-operator
  namespace: default
spec:
  interval: 5m
  install:
    remediation:
      retries: 3
  chartRef:
    kind: OCIRepository
    name: radix-operator-chart
    namespace: flux-system
  values:
    dnsZone: ${dnsZone} # set in configmap flux-system/radix-flux-config
    appAliasBaseURL: ${appAliasBaseURL} # set in configmap flux-system/radix-flux-config
    prometheusName: ${prometheusName} # set in configmap flux-system/radix-flux-config
    clusterType: ${clusterType} # set in configmap flux-system/radix-flux-config
    clusterName: ${clusterName} # set in configmap flux-system/radix-flux-config
    subscriptionId: ${subscriptionId} # set in configmap flux-system/radix-flux-config

    tenantId: 3aa4a235-b6e2-48d5-9195-7fcf05b459b0
    radixZone: ${zone}
    containerRegistry: ${imageRegistry}
    appContainerRegistry: ${RADIX_APP_ACR_REPO_URL}

    registrationControllerThreads: 21
    applicationControllerThreads: 21
    environmentControllerThreads: 21
    deploymentControllerThreads: 21
    jobControllerThreads: 21
    alertControllerThreads: 21
    kubeClientRateLimitBurst: 500
    kubeClientRateLimitQPS: 500
    externalRegistryDefaultAuthSecret: radix-external-registry-default-auth
    safeToRestartBatchJobThreshold: 259200 # 3 days in seconds

    ingress:
      certificate:
        automation:
          clusterIssuer: digicert-http01
          gatewayClusterIssuer: digicert-http01-gateway

      gateway:
        name: "gateway"
        namespace: "istio-system"
        sectionName: "https"

    resources:
      limits:
        cpu: "2"
        memory: 2Gi
      requests:
        cpu: 100m
        memory: 1Gi

    app:
      limitrange:
        default:
          memory: 500Mi
      builder:
        resources:
          limits:
            memory: 10Gi
          requests:
            memory: 1Gi
            cpu: 800m

    securityContext:
      readOnlyRootFilesystem: true

    seccompProfile:
      image:
        repository: docker.io/alpine
        tag: ${SECCOMP_IMAGE_TAG}
        pullSecrets:
          - "radix-external-registry-default-auth"
      installer:
        resources:
          limits:
            cpu: 10m
            memory: 20Mi
          requests:
            cpu: 10m
            memory: 10Mi

    gitClone:
      image:
        tag: ${GIT_CLONE_TAG}
        repository: docker.io/alpine/git

    oauth2proxy:
      image:
        tag: ${OAUTH2PROXY_TAG}
        repository: quay.io/oauth2-proxy/oauth2-proxy

    oauth2redis:
      image:
        tag: ${OAUTH2REDIS_TAG}
        repository: docker.io/redis

    radixImageBuilder:
      image:
        tag: ${RADIX_IMAGE_BUILDER_TAG}

    radixBuildKitImageBuilder:
      image:
        tag: ${RADIX_BUILDKIT_IMAGE_BUILDER_TAG}

    radixGroups: # deprecated: remove after https://github.com/equinor/radix-private/issues/443
      user: 64b28659-4fe4-4222-8497-85dd7e43e25b

    rbac:
      createApp:
        groups:
          - 64b28659-4fe4-4222-8497-85dd7e43e25b # Radix Platform Users
          - 4e1761bc-0c4f-4672-a16d-7f3d8608e366 # AZAPPL Radix Platform

    radixApiServer:
      prometheusUrl: http://prometheus-operator-prometheus.monitor.svc.cluster.local:9090
      oidcAzureAudience: 6dae42f8-4368-4678-94ff-3960e28e3630
      oidcAzureIssuer: https://sts.windows.net/3aa4a235-b6e2-48d5-9195-7fcf05b459b0/
      useProfiler: false

      oidcKubernetesIssuer: ${kubernetesIssuerUrl} # set in configmap flux-system/radix-flux-config
      oidcKubernetesAudience: ${kubernetesIssuerUrl} # set in configmap flux-system/radix-flux-config
      clusterOidcIssuers: ${clusterOidcIssuers} # set in configmap flux-system/radix-flux-config
      clusterEgressIps: ${clusterEgressIPs} # set in configmap flux-system/radix-flux-config

      routes:
        main:
          enabled: false # change to true when ready
          hostnames:
            - api.${dnsZone}
            - api.${clusterName}.${dnsZone}

            - server-radix-api-qa.${dnsZone}
            - server-radix-api-qa.${clusterName}.${dnsZone}

            - server-radix-api-prod.${dnsZone}
            - server-radix-api-prod.${clusterName}.${dnsZone}

      networkPolicy:
        ingress:
          from:
            - namespaceSelector:
                matchLabels:
                  purpose: radix-base-ns
              podSelector:
                matchLabels:
                  app.kubernetes.io/name: ingress-nginx
            - namespaceSelector:
                matchLabels:
                  purpose: radix-base-ns
              podSelector:
                matchLabels:
                  app.kubernetes.io/name: prometheus
            - namespaceSelector:
                matchLabels:
                  purpose: radix-base-ns
              podSelector:
                matchLabels:
                  gateway.networking.k8s.io/gateway-name: gateway

    radixWebhook:
      enabled: true
      logLevel: info
      logPretty: false
      requireAdGroups: true
      requireConfigurationItem: true

      reservedAppDNSAliases:
        api: radix-api
        canary: radix-canary-golang
        console: radix-web-console
        cost-api: radix-cost-allocation-api
        webhook: radix-github-webhook
        www: radix-public-site

      reservedDNSAliases:
        - grafana
        - prometheus
        - app
        - playground
        - dev

    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: kubernetes.io/os
                  operator: In
                  values:
                    - linux
                - key: kubernetes.io/arch
                  operator: In
                  values:
                    - amd64

    podSecurityStandard: # Ref https://kubernetes.io/docs/concepts/security/pod-security-standards/
      enforce:
        level: baseline
        version: v1.23
